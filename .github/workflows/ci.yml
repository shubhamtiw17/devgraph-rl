name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install -e ".[graphs]"
          pip install datasets>=2.20.0 peft>=0.11.0 trl>=0.9.0
      - name: Lint
        run: ruff check src/ || true
      - name: Test
        run: pytest tests/ -v
        env:
          ANTHROPIC_API_KEY: dummy
          GROQ_API_KEY: dummy
          GEMINI_API_KEY: dummy
          COHERE_API_KEY: dummy
